name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: greyfield-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-bot-review-gate:
    name: PR bot review gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Fail on unresolved bot review threads
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/check-pr-bot-review-threads.mjs

  fast:
    name: Fast checks
    runs-on: windows-latest
    timeout-minutes: 10
    needs:
      - pr-bot-review-gate
      - changes
    permissions:
      contents: read
    steps:
      - name: Skip fast checks for docs-only changes
        if: needs.changes.outputs.code_checks != 'true'
        run: echo "Fast checks skipped because this change only touched docs/planning paths."
      - uses: actions/checkout@v4
        if: needs.changes.outputs.code_checks == 'true'
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        if: needs.changes.outputs.code_checks == 'true'
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        if: needs.changes.outputs.code_checks == 'true'
        with:
          node-version: 24
          cache: pnpm
      - name: Install
        if: needs.changes.outputs.code_checks == 'true'
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        if: needs.changes.outputs.code_checks == 'true'
        run: pnpm typecheck
      - name: Unit tests
        if: needs.changes.outputs.code_checks == 'true'
        run: pnpm test
      - name: Acceptance harness
        if: needs.changes.outputs.code_checks == 'true'
        run: pnpm harness:acceptance
      - name: Memory benchmark
        if: needs.changes.outputs.code_checks == 'true'
        env:
          GREYFIELD_MEMORY_BENCHMARK_ARTIFACT_DIR: .cache/greyfield-memory-benchmark/latest
        run: pnpm harness:memory-benchmark
      - name: Upload memory benchmark summary
        if: always() && needs.changes.outputs.code_checks == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: memory-benchmark-summary
          path: .cache/greyfield-memory-benchmark/latest/summary.json
          if-no-files-found: error

  desktop-pet:
    name: Desktop pet quick harness
    runs-on: windows-latest
    timeout-minutes: 10
    needs:
      - fast
      - changes
    steps:
      - name: Skip desktop pet quick harness for non-desktop changes
        if: needs.changes.outputs.desktop_pet != 'true'
        run: echo "Desktop pet quick harness skipped because this change did not touch desktop pet paths."
      - uses: actions/checkout@v4
        if: needs.changes.outputs.desktop_pet == 'true'
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        if: needs.changes.outputs.desktop_pet == 'true'
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        if: needs.changes.outputs.desktop_pet == 'true'
        with:
          node-version: 24
          cache: pnpm
      - name: Install
        if: needs.changes.outputs.desktop_pet == 'true'
        run: pnpm install --frozen-lockfile
      - name: Install Electron binary
        if: needs.changes.outputs.desktop_pet == 'true'
        run: pnpm --dir apps/desktop ensure:electron
      - name: Build desktop once
        if: needs.changes.outputs.desktop_pet == 'true'
        run: pnpm build:desktop
      - name: Pet quick harness
        if: needs.changes.outputs.desktop_pet == 'true'
        run: pnpm harness:pet:quick

  changes:
    name: Change classifier
    runs-on: windows-latest
    outputs:
      code_checks: ${{ steps.filter.outputs.code_checks }}
      desktop_pet: ${{ steps.filter.outputs.desktop_pet }}
      frontend_full: ${{ steps.filter.outputs.frontend_full }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: filter
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -ne "pull_request") {
            "code_checks=true" >> $env:GITHUB_OUTPUT
            "desktop_pet=true" >> $env:GITHUB_OUTPUT
            "frontend_full=true" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $base = "${{ github.event.pull_request.base.sha }}"
          $head = "${{ github.event.pull_request.head.sha }}"

          $files = git diff --name-only $base $head
          $codePatterns = @(
            '^apps/',
            '^packages/',
            '^scripts/',
            '^package\.json$',
            '^pnpm-lock\.yaml$',
            '^tsconfig',
            '^\.github/workflows/ci\.yml$'
          )
          $desktopPatterns = @(
            '^apps/desktop/',
            '^packages/stage-live2d/',
            '^packages/dev-harness/',
            '^package\.json$',
            '^pnpm-lock\.yaml$',
            '^tsconfig',
            '^\.github/workflows/ci\.yml$'
          )
          $frontendPatterns = @(
            '^apps/desktop/',
            '^packages/stage-live2d/',
            '^packages/audio-runtime/',
            '^packages/dev-harness/',
            '^package\.json$',
            '^pnpm-lock\.yaml$',
            '^tsconfig',
            '^\.github/workflows/ci\.yml$'
          )
          $codeMatched = $false
          $desktopMatched = $false
          $frontendMatched = $false
          foreach ($file in $files) {
            foreach ($pattern in $codePatterns) {
              if ($file -match $pattern) {
                $codeMatched = $true
                break
              }
            }
            foreach ($pattern in $desktopPatterns) {
              if ($file -match $pattern) {
                $desktopMatched = $true
                break
              }
            }
            foreach ($pattern in $frontendPatterns) {
              if ($file -match $pattern) {
                $frontendMatched = $true
                break
              }
            }
          }
          "code_checks=$($codeMatched.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "desktop_pet=$($desktopMatched.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "frontend_full=$($frontendMatched.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

  frontend-full:
    name: frontend-full
    runs-on: windows-latest
    timeout-minutes: 45
    needs:
      - fast
      - changes
    steps:
      - name: Skip frontend-full for non-frontend changes
        if: needs.changes.outputs.frontend_full != 'true'
        run: echo "frontend-full skipped because this change did not touch frontend-visible paths."
      - uses: actions/checkout@v4
        if: needs.changes.outputs.frontend_full == 'true'
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        if: needs.changes.outputs.frontend_full == 'true'
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        if: needs.changes.outputs.frontend_full == 'true'
        with:
          node-version: 24
          cache: pnpm
      - name: Install
        if: needs.changes.outputs.frontend_full == 'true'
        run: pnpm install --frozen-lockfile
      - name: Install Electron binary
        if: needs.changes.outputs.frontend_full == 'true'
        run: pnpm --dir apps/desktop ensure:electron
      - name: Run frontend-full guard
        if: needs.changes.outputs.frontend_full == 'true'
        run: pnpm harness:frontend-full
